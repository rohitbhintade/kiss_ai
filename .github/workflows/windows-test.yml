name: Windows Extension Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/windows-test.yml'

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install VS Code
        shell: pwsh
        run: |
          $url = "https://update.code.visualstudio.com/latest/win32-x64-user/stable"
          $installer = "$env:TEMP\vscode-installer.exe"
          Write-Host "Downloading VS Code..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing VS Code..."
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/NORESTART", "/MERGETASKS=!runcode" -Wait
          $codePath = "$env:LOCALAPPDATA\Programs\Microsoft VS Code"
          echo "$codePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$codePath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "VS Code installed to $codePath"

      - name: Install KISS Sorcar extension
        shell: pwsh
        run: |
          $code = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd"
          $vsix = "${{ github.workspace }}\src\kiss\agents\vscode\kiss-sorcar.vsix"
          Write-Host "Installing KISS Sorcar extension from $vsix"
          & $code --install-extension $vsix --force 2>&1
          Write-Host "Installed extensions:"
          & $code --list-extensions 2>&1

      - name: Pre-install uv and set up Python environment
        shell: pwsh
        run: |
          Write-Host "Installing uv..."
          irm https://astral.sh/uv/0.11.2/install.ps1 | iex
          $uvDir = "$env:USERPROFILE\.local\bin"
          echo "$uvDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$uvDir;$env:PATH"
          Write-Host "uv installed: $(& "$uvDir\uv.exe" --version)"

          $extDir = Get-ChildItem "$env:USERPROFILE\.vscode\extensions\ksenxx.kiss-sorcar-*" -Directory | Select-Object -First 1
          $kissProject = "$($extDir.FullName)\kiss_project"
          Write-Host "KISS project path: $kissProject"
          if (-not (Test-Path "$kissProject\pyproject.toml")) {
              Write-Host "ERROR: kiss_project not found!"
              exit 1
          }

          Write-Host "Running uv sync..."
          & "$uvDir\uv.exe" sync --directory $kissProject 2>&1
          Write-Host "uv sync completed"

          Write-Host "Installing Playwright Chromium..."
          & "$uvDir\uv.exe" run --directory $kissProject python -m playwright install chromium 2>&1
          Write-Host "Playwright installed"

          # Save kiss_project path for later steps
          echo "KISS_PROJECT=$kissProject" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create demo workspace
        shell: pwsh
        run: |
          $dir = "$env:TEMP\kiss-test-workspace"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Set-Content -Path "$dir\example.py" -Value "# Example file`nprint('hello world')"
          # Initialize git repo (required for diff/merge features)
          Push-Location $dir
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          git add -A
          git commit -m "initial"
          Pop-Location
          Write-Host "Workspace created at $dir"

      - name: Write screenshot helper
        shell: pwsh
        run: |
          $script = @'
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap($screen.Width, $screen.Height)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, [System.Drawing.Size]::new($screen.Width, $screen.Height))
          $bmp.Save($args[0], [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose()
          $bmp.Dispose()
          Write-Host "Screenshot saved to $($args[0])"
          '@
          Set-Content -Path "${{ github.workspace }}\ss.ps1" -Value $script

      - name: Write API key marker
        shell: pwsh
        run: |
          $kissDir = "$env:USERPROFILE\.kiss"
          New-Item -ItemType Directory -Force -Path $kissDir | Out-Null
          Set-Content -Path "$kissDir\.api-keys-prompted" -Value (Get-Date -Format o)

      # ── TEST 1: Backend functional test (Python server + real LLM task) ──
      - name: Run backend task test via Python server
        shell: pwsh
        timeout-minutes: 10
        run: |
          $kissProject = $env:KISS_PROJECT
          $uvExe = "$env:USERPROFILE\.local\bin\uv.exe"
          $workDir = "$env:TEMP\kiss-test-workspace"

          # Write the test driver script
          $testScript = @'
          import json, subprocess, sys, threading, time, os

          kiss_project = sys.argv[1]
          uv_exe = sys.argv[2]
          work_dir = sys.argv[3]

          print(f"Starting server from {kiss_project}")
          print(f"Work dir: {work_dir}")
          print(f"uv: {uv_exe}")

          proc = subprocess.Popen(
              [uv_exe, "run", "python", "-u", "-m", "kiss.agents.vscode.server"],
              cwd=kiss_project,
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              env={**os.environ, "PYTHONUNBUFFERED": "1", "KISS_WORKDIR": work_dir},
          )

          # Collect all stdout events in a list
          events = []
          stderr_lines = []
          task_done = threading.Event()

          def read_stdout():
              for line in proc.stdout:
                  text = line.decode("utf-8", errors="replace").strip()
                  if not text:
                      continue
                  try:
                      evt = json.loads(text)
                      events.append(evt)
                      etype = evt.get("type", "")
                      print(f"  EVENT: {etype}", flush=True)
                      if etype in ("task_done", "task_error", "task_stopped"):
                          task_done.set()
                  except json.JSONDecodeError:
                      print(f"  RAW: {text[:200]}", flush=True)

          def read_stderr():
              for line in proc.stderr:
                  text = line.decode("utf-8", errors="replace").strip()
                  if text:
                      stderr_lines.append(text)
                      print(f"  STDERR: {text[:200]}", flush=True)

          t1 = threading.Thread(target=read_stdout, daemon=True)
          t2 = threading.Thread(target=read_stderr, daemon=True)
          t1.start()
          t2.start()

          # Wait a moment for server to initialize
          time.sleep(3)

          # Send the run command
          cmd = {
              "type": "run",
              "prompt": "Create a file called hello.txt containing exactly: Hello from Windows!",
              "model": "claude-sonnet-4-20250514",
              "workDir": work_dir,
          }
          print(f"\nSending command: {json.dumps(cmd)}", flush=True)
          proc.stdin.write((json.dumps(cmd) + "\n").encode())
          proc.stdin.flush()

          # Wait for task completion (up to 5 minutes)
          if task_done.wait(timeout=300):
              print("\nTask completed!", flush=True)
          else:
              print("\nTask timed out after 5 minutes!", flush=True)

          # Send stop and close
          try:
              proc.stdin.write(b'{"type":"stop"}\n')
              proc.stdin.flush()
              proc.stdin.close()
          except:
              pass
          proc.wait(timeout=10)

          # Print summary
          print(f"\n{'='*60}")
          print(f"Total events: {len(events)}")
          print(f"Stderr lines: {len(stderr_lines)}")

          # Check for task_done event
          done_events = [e for e in events if e.get("type") in ("task_done", "task_error", "task_stopped")]
          if done_events:
              print(f"Task result: {done_events[0].get('type')}")
              if done_events[0].get("type") == "task_error":
                  print(f"Error: {done_events[0].get('text', 'unknown')}")
          else:
              print("No task completion event found!")

          # Check if hello.txt was created
          hello_path = os.path.join(work_dir, "hello.txt")
          if os.path.exists(hello_path):
              content = open(hello_path).read()
              print(f"\nSUCCESS: hello.txt created with content: {content!r}")
          else:
              print(f"\nFAILED: hello.txt was not created")
              print("Files in workspace:")
              for root, dirs, files in os.walk(work_dir):
                  for f in files:
                      fp = os.path.join(root, f)
                      print(f"  {fp}")

          # Print event types for debugging
          print(f"\nEvent types: {[e.get('type') for e in events]}")

          # Write events to file for artifact upload
          with open(os.path.join(os.environ.get("GITHUB_WORKSPACE", "."), "backend-events.json"), "w") as f:
              json.dump(events, f, indent=2)

          # Exit with appropriate code
          if os.path.exists(hello_path):
              sys.exit(0)
          else:
              sys.exit(1)
          '@

          Set-Content -Path "${{ github.workspace }}\test_backend.py" -Value $testScript

          Write-Host "Running backend test..."
          & python "${{ github.workspace }}\test_backend.py" $kissProject $uvExe $workDir 2>&1
          $backendResult = $LASTEXITCODE
          Write-Host "Backend test exit code: $backendResult"

          if ($backendResult -ne 0) {
              Write-Host "::warning::Backend task test did not create hello.txt"
          }

      # ── TEST 2: UI visual test (extension renders on Windows) ──
      - name: Launch VS Code and capture UI
        shell: pwsh
        run: |
          $code = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\Code.exe"
          $dir = "$env:TEMP\kiss-test-workspace"
          Start-Process -FilePath $code -ArgumentList "--no-sandbox", "--disable-gpu", $dir
          Write-Host "Waiting 30s for VS Code..."
          Start-Sleep -Seconds 30
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-01-loaded.png"

      - name: Open KISS Sorcar panel via command palette
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $cs = 'using System; using System.Runtime.InteropServices; public class W32 { [DllImport("user32.dll")] public static extern bool SetForegroundWindow(IntPtr h); }'
          Add-Type -TypeDefinition $cs -Language CSharp
          $vscode = Get-Process -Name "Code" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne [IntPtr]::Zero } | Select-Object -First 1
          if ($vscode) { [W32]::SetForegroundWindow($vscode.MainWindowHandle) | Out-Null }
          Start-Sleep -Seconds 1

          [System.Windows.Forms.SendKeys]::SendWait("^+p")
          Start-Sleep -Seconds 2
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-02-palette.png"

          [System.Windows.Forms.SendKeys]::SendWait("KISS{:} Open Sorcar Chat")
          Start-Sleep -Seconds 2
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-03-typed.png"

          [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")
          Start-Sleep -Seconds 5
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-04-panel.png"

      - name: Verify workspace result
        shell: pwsh
        run: |
          $testFile = "$env:TEMP\kiss-test-workspace\hello.txt"
          if (Test-Path $testFile) {
              Write-Host "SUCCESS: hello.txt exists!"
              Write-Host "Content: $(Get-Content $testFile -Raw)"
          } else {
              Write-Host "Files in workspace:"
              Get-ChildItem "$env:TEMP\kiss-test-workspace" -Recurse | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Collect logs
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:USERPROFILE\.kiss\install.log"
          if (Test-Path $logFile) {
              Write-Host "=== install.log ==="
              Get-Content $logFile
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: |
            ui-*.png
            backend-events.json
          retention-days: 7
