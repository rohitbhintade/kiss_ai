name: Windows Extension Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/windows-test.yml'

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install VS Code
        shell: pwsh
        run: |
          $url = "https://update.code.visualstudio.com/latest/win32-x64-user/stable"
          $installer = "$env:TEMP\vscode-installer.exe"
          Write-Host "Downloading VS Code..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing VS Code..."
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/NORESTART", "/MERGETASKS=!runcode" -Wait
          $codePath = "$env:LOCALAPPDATA\Programs\Microsoft VS Code"
          echo "$codePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$codePath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "VS Code installed to $codePath"

      - name: Install KISS Sorcar extension
        shell: pwsh
        run: |
          $code = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd"
          $vsix = "${{ github.workspace }}\src\kiss\agents\vscode\kiss-sorcar.vsix"
          Write-Host "Installing KISS Sorcar extension from $vsix"
          & $code --install-extension $vsix --force 2>&1
          Write-Host "Installed extensions:"
          & $code --list-extensions 2>&1

      - name: Pre-install uv and set up Python environment
        shell: pwsh
        run: |
          Write-Host "Installing uv..."
          irm https://astral.sh/uv/0.11.2/install.ps1 | iex
          $uvDir = "$env:USERPROFILE\.local\bin"
          echo "$uvDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$uvDir;$env:PATH"
          Write-Host "uv installed: $(& "$uvDir\uv.exe" --version)"

          $extDir = Get-ChildItem "$env:USERPROFILE\.vscode\extensions\ksenxx.kiss-sorcar-*" -Directory | Select-Object -First 1
          $kissProject = "$($extDir.FullName)\kiss_project"
          Write-Host "KISS project path: $kissProject"
          if (-not (Test-Path "$kissProject\pyproject.toml")) {
              Write-Host "ERROR: kiss_project not found!"
              exit 1
          }

          Write-Host "Running uv sync..."
          & "$uvDir\uv.exe" sync --directory $kissProject 2>&1
          Write-Host "uv sync completed"

          Write-Host "Installing Playwright Chromium..."
          & "$uvDir\uv.exe" run --directory $kissProject python -m playwright install chromium 2>&1
          Write-Host "Playwright installed"

          echo "KISS_PROJECT=$kissProject" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create demo workspace
        shell: pwsh
        run: |
          $dir = "$env:TEMP\kiss-test-workspace"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Set-Content -Path "$dir\example.py" -Value "# Example file`nprint('hello world')"
          Push-Location $dir
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          git add -A
          git commit -m "initial"
          Pop-Location
          Write-Host "Workspace created at $dir"

      - name: Write screenshot helper
        shell: pwsh
        run: |
          $script = @'
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap($screen.Width, $screen.Height)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, [System.Drawing.Size]::new($screen.Width, $screen.Height))
          $bmp.Save($args[0], [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose()
          $bmp.Dispose()
          Write-Host "Screenshot saved to $($args[0])"
          '@
          Set-Content -Path "${{ github.workspace }}\ss.ps1" -Value $script

      - name: Write API key marker
        shell: pwsh
        run: |
          $kissDir = "$env:USERPROFILE\.kiss"
          New-Item -ItemType Directory -Force -Path $kissDir | Out-Null
          Set-Content -Path "$kissDir\.api-keys-prompted" -Value (Get-Date -Format o)

      # ── TEST 1: Imports and API connectivity ──
      - name: Verify KISS package on Windows
        shell: pwsh
        run: |
          $kissProject = $env:KISS_PROJECT
          $uvExe = "$env:USERPROFILE\.local\bin\uv.exe"
          & $uvExe run --directory $kissProject python -c "from kiss.agents.sorcar.stateful_sorcar_agent import StatefulSorcarAgent; print('StatefulSorcarAgent import OK')" 2>&1
          & $uvExe run --directory $kissProject python -c "import platform; print(f'Python {platform.python_version()} on {platform.system()} {platform.machine()}')" 2>&1

      - name: Test Anthropic API connectivity
        if: env.ANTHROPIC_API_KEY != ''
        shell: pwsh
        timeout-minutes: 2
        run: |
          $kissProject = $env:KISS_PROJECT
          $uvExe = "$env:USERPROFILE\.local\bin\uv.exe"
          & $uvExe run --directory $kissProject python -c @"
          import anthropic, time
          t0 = time.time()
          client = anthropic.Anthropic()
          resp = client.messages.create(model='claude-sonnet-4-20250514', max_tokens=50, messages=[{'role':'user','content':'Say hello in one word'}])
          print(f'API response in {time.time()-t0:.1f}s: {resp.content[0].text}')
          print('API connectivity: OK')
          "@ 2>&1

      # ── TEST 2: Direct agent test (the real functional test) ──
      - name: Run agent task on Windows
        if: env.ANTHROPIC_API_KEY != ''
        shell: pwsh
        timeout-minutes: 5
        run: |
          $kissProject = $env:KISS_PROJECT
          $uvExe = "$env:USERPROFILE\.local\bin\uv.exe"
          $workDir = (Get-Item "$env:TEMP\kiss-test-workspace").FullName

          & $uvExe run --directory $kissProject python -c @"
          import os, sys, time
          work_dir = r'$workDir'
          print(f'Work dir: {work_dir}')
          print(f'Files before: {os.listdir(work_dir)}')
          t0 = time.time()
          from kiss.agents.sorcar.stateful_sorcar_agent import StatefulSorcarAgent
          agent = StatefulSorcarAgent('windows-test')
          print(f'Agent created in {time.time()-t0:.1f}s')
          print('Running task...')
          agent.run(
              prompt_template='Create a file called hello.txt containing exactly: Hello from Windows!',
              model_name='claude-sonnet-4-20250514',
              work_dir=work_dir,
          )
          print(f'Task completed in {time.time()-t0:.1f}s')
          print(f'Files after: {os.listdir(work_dir)}')
          hello = os.path.join(work_dir, 'hello.txt')
          if os.path.exists(hello):
              print(f'SUCCESS: {open(hello).read()!r}')
          else:
              print('FAILED: hello.txt not created')
              sys.exit(1)
          "@ 2>&1

      # ── TEST 3: UI visual test (extension renders on Windows) ──
      - name: Launch VS Code and capture UI
        if: always()
        shell: pwsh
        run: |
          $code = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\Code.exe"
          $dir = "$env:TEMP\kiss-test-workspace"
          Start-Process -FilePath $code -ArgumentList "--no-sandbox", "--disable-gpu", $dir
          Write-Host "Waiting 30s for VS Code..."
          Start-Sleep -Seconds 30
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-01-loaded.png"

      - name: Open KISS Sorcar panel via command palette
        if: always()
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $cs = 'using System; using System.Runtime.InteropServices; public class W32 { [DllImport("user32.dll")] public static extern bool SetForegroundWindow(IntPtr h); }'
          Add-Type -TypeDefinition $cs -Language CSharp
          $vscode = Get-Process -Name "Code" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne [IntPtr]::Zero } | Select-Object -First 1
          if ($vscode) { [W32]::SetForegroundWindow($vscode.MainWindowHandle) | Out-Null }
          Start-Sleep -Seconds 1

          [System.Windows.Forms.SendKeys]::SendWait("^+p")
          Start-Sleep -Seconds 2
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-02-palette.png"

          [System.Windows.Forms.SendKeys]::SendWait("KISS{:} Open Sorcar Chat")
          Start-Sleep -Seconds 2
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-03-typed.png"

          [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")
          Start-Sleep -Seconds 5
          & "${{ github.workspace }}\ss.ps1" "${{ github.workspace }}\ui-04-panel.png"

      - name: Verify workspace result
        if: always()
        shell: pwsh
        run: |
          $testFile = "$env:TEMP\kiss-test-workspace\hello.txt"
          if (Test-Path $testFile) {
              Write-Host "SUCCESS: hello.txt exists!"
              Write-Host "Content: $(Get-Content $testFile -Raw)"
          } else {
              Write-Host "Files in workspace:"
              Get-ChildItem "$env:TEMP\kiss-test-workspace" -Recurse -File | Where-Object { $_.FullName -notlike "*\.git\*" } | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Collect logs
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:USERPROFILE\.kiss\install.log"
          if (Test-Path $logFile) {
              Write-Host "=== install.log ==="
              Get-Content $logFile
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: ui-*.png
          retention-days: 7
